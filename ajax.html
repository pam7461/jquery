<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아작스</title>
  <script src="js/jquery-3.5.0.min.js"></script>
  <script>
    $(function(){
      var scrTop;
      $(window).scroll(function(){
        scrTop=$(this).scrollTop();
        console.log(scrTop);
        if(scrTop>1000){
          $('#box1').load('data1.txt').css('height','2000px');
        }
        if(scrTop>3000){
          $('#box2').load('data2.txt').css('height','2000px');
        }
        if(scrTop>5000){
          $('#box3').load('data3.txt').css('height','2000px');
        }
      });
    })
  </script>
  <style>
    .wrap{border:1px solid black;}
    #box0{height:2000px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="box0">
      처음부 나오는 박스
    </div>
    <div id="box1"></div>
    <div id="box2"></div>
    <div id="box3"></div>
  </div>
</body>
</html>
