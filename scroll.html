<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스크롤이벤트</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.0/jquery.min.js"></script>
  <script>
    $(function(){
      $(window).scroll(function(){
        var scrTop=$(this).scrollTop();
        $('#box01').css({'left':500-scrTop,'top':scrTop*2});
        $('#box02').css('right',(500-scrTop)/2);
      });
    })
  </script>
  <style>
    *{margin:0;border:none;padding:0;}
    .wrap{
      width:100%;
      height:5000px;
      background:rgba(0,0,0,0.1);
    }
    #box01{
      position:fixed;
      left:500px;
      top:0;
      transform:translateX(-50%);
      width:100px;
      height:100px;
      background:red;
    }
    #box02{
      position:fixed;
      right:500px;
      top:0;
      transform:translateX(50%);
      width:100px;
      height:100px;
      background:blue;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="box01">
    </div>
    <div id="box02">
    </div>
  </div>
</body>
</html>
