<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>class(클래스) 메서드</title>
  <style>
    .red{background-color:red;}
    .green{background-color:green;}
    .blue{background-color:blue;}

    .cyan{background-color:cyan;}
    .magenta{background-color:magenta;}
    .yellow{background-color:yellow;}

    .hide{display:none;}
    
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.0/jquery.min.js"></script>
  <script>
    $(function(){
      $('li').eq(1).mouseover(function(){
        $(this).removeClass('red').addClass('cyan');
      });
      $('li').eq(1).mouseout(function(){
        $(this).removeClass('cyan').addClass('red');
      });
      $('.blue').click(function(){
        $(this).addClass('hide');
      });

      $('#list01').click(function(){
        $(this).toggleClass('magenta');
      })

      $('li').click(function(){
        var tmp=$(this).hasClass('green');
        if(tmp){
          $(this).removeClass('green').addClass('yellow');
        }

      })
    })
  </script>
</head>
<body>
  <ul>
    <li id="list01">목록1</li>
    <li class="red">목록2</li>
    <li>목록3</li>
    <li class="green">목록4</li>
    <li>목록5</li>
    <li class="blue">목록6</li>
  </ul>
</body>
</html>
