<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>val</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.0/jquery.min.js"></script>
  <script>
    $(function(){
      // cancal event
      $('#cancle').click(function(){
        $('#name').val('');
        $('#age').val('');
      })
      // join enent
      $('#join').click(function(){
        var userName=$('#name').val();
        var userSex;
        if($('#man').is(':checked')){
          userSex='남';
        }else{
          userSex='여';
        }
        var userAge=$('#age').val();
        $('div').html('<h2>'+userName+'</h2><h3>'+userSex+'</h3><h2>'+userAge+'</h2>');
      })
    })
  </script>
</head>
<body>
  <h1>val()</h1>
  <form>
    <label for="name">name</label>
    <input type="text" id="name">
    <br>
    <p>성별</p>
    <input type="radio" name="sex" id="man" checked>
    <label for="man">남</label>
    <input type="radio" name="sex" id="girl">
    <label for="girl">여</label>
    <br>
    <label for="age">나이</label>
    <input type="text" name="age" id="age">
    <br>
    <input type="button" value="가입" id="join">
    <input type="button" value="취소" id="cancle">
  </form>
  <div></div>
</body>
</html>
