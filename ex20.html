<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallBack Function</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.0/jquery.min.js"></script>
  <script>
    $(function(){
      $('#m1').addClass('box');
      $('#m2>div').addClass(function(tmp){
        return 'circle0'+(tmp+1);
      });

    })
  </script>
  <style>
    *{margin:0;border:none;padding:0;}
    #m2{text-align:center;}
    .box{
      text-align:center;
      margin-bottom:10px;
      border-bottom:1px solid #666;
      padding:10px 0;
    }
    .circle01,.circle02,.circle03{
      width:200px;
      height:200px;
      border-radius:50%;
      text-align:center;
      line-height:200px;
      display:inline-block;
    }
    .circle01{border:1px solid red;}
    .circle02{border:1px solid green;}
    .circle03{border:1px solid blue;}
  </style>
</head>
<body>
  <div id="m1">
    <div>jQuery</div>
  </div>
  <div id="m2">
    <div>html</div>
    <div>CSS</div>
    <div>javaScript</div>
  </div>
</body>
</html>
