<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포지션(위치)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.0/jquery.min.js"></script>
  <script>
    $(function(){
      $('#btn01').click(function(){
        var posLeft=$('#chl_box').position().left;
        var posTop=$('#chl_box').position().top;
        console.log('부모의 왼쪽에서'+posLeft+'px');
        console.log('부모의 윗쪽에서'+posTop+'px');
      })

      $('#btn02').click(function(){
        var offLeft=$('#chl_box').offset().left;
        var offTop=$('#chl_box').offset().top;
        console.log('자식은 왼쪽으로부터'+offLeft+'px 떨어져 있고');
        console.log('자식은 위로부터'+offTop+'px 떨어져 있다');
      })
    })
  </script>
  <style>
    h1{font-size:50px;text-align: center;}
    div{box-sizing:border-box;margin:0 auto;border:1px solid black;padding:10px;}
    #par_box{position:relative;width:600px;height:600px;}
    #chl_box{position:absolute;left:10%;top:10%;width:100px;height:100px;background:green;}
    p{text-align:center;}
  </style>
</head>
<body>
  <h1>BOX</h1>
  <div id="par_box">
    <div id="chl_box">

    </div>
  </div>
  <p>
    <input type="button" id="btn01" value="좌표1">
    <input type="button" id="btn02" value="좌표2">
  </p>
</body>
</html>
