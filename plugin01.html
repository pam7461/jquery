<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/bxslider/4.2.12/jquery.bxslider.css">

  <script src="https://cdn.jsdelivr.net/bxslider/4.2.12/jquery.bxslider.min.js"></script>
  <script>
    $(function(){
      var parDiv=$('#wrap');
      parDiv.bxSlider({
        mode:'fade',
        randomStart:true,
        infiniteLoop:false,
        captions:true
      });
    });
  </script>
</head>
<body>

  <div id="wrap">
    <div><img src="images/img01.png" alt="img01" title="이미지1"></div>
    <div><img src="images/img02.jpg" alt="img02" title="이미지2"></div>
    <div><img src="images/img03.jpg" alt="img03" title="이미지3"></div>
  </div>

</body>
</html>
